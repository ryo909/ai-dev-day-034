<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Day034 — お題ルーレット</title><meta name="description" content="すぐ遊べるお題を決めるためのツールです。"><style>
.explain-card{margin:0 0 18px 0;padding:16px 18px;border-radius:18px;background:rgba(255,255,255,.9);border:1px solid rgba(15,23,42,.08);box-shadow:0 12px 30px rgba(15,23,42,.08)}
.intro-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:14px 0}
.intro-block{padding:12px 14px;border-radius:14px;background:rgba(248,250,252,.9)}
.intro-block h2{margin:0 0 6px 0;font-size:.95rem}
.intro-block p{margin:0;line-height:1.6}
.steps-list{margin:0;padding-left:18px;line-height:1.7}
.intro-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-top:14px}
.ghost-button{appearance:none;border:1px solid rgba(15,23,42,.15);background:#fff;color:#0f172a;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer}
.mini-label{font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;opacity:.72}
.empty-state{padding:14px;border-radius:12px;background:rgba(148,163,184,.12);line-height:1.7}
.section-note{margin-top:8px;font-size:.92rem;opacity:.78}
@media (max-width:900px){.intro-grid{grid-template-columns:1fr}}
</style><link rel="stylesheet" href="/src/style.css"></head>
<body><div id="app"><section class="explain-card">
  <div class="mini-label">Day034</div>
  <h1>お題ルーレット</h1>
  <p>すぐ遊べるお題を決めるためのツールです。</p>
  <div class="intro-grid">
    <div class="intro-block">
      <h2>このツールでできること</h2>
      <p>すぐ遊べるお題を決めるためのツールです。</p>
    </div>
    <div class="intro-block">
      <h2>こんな時に使います</h2>
      <p>短いお題で気分を変えたい時に使います。</p>
    </div>
    <div class="intro-block">
      <h2>使い方</h2>
      <ol class="steps-list"><li>お題を入れる</li><li>結果を見る</li><li>そのまま決める</li></ol>
    </div>
  </div>
  <div class="intro-actions">
    <button id="sampleFillBtn" class="ghost-button">サンプルで試す</button>
    <a href="https://github.com/ryo909/ai-dev-day-034" target="_blank" rel="noopener">GitHub</a>
  </div>
  <div class="section-note">お題を入れて回すと、今回のお題が出ます。</div>
</section><div class="game"><input id="missionInput" placeholder="10分 / 1人 / 制約あり"><button id="addMissionBtn">追加する</button><h2>ここを見ればOKです</h2><div class="wheel" id="wheelFace">まだ回していません</div><div class="controls"><button id="spinBtn">回してみる</button><button id="clearRoundBtn">やり直す</button></div><div class="score"><strong>Score: <span id="scoreValue">0</span></strong><strong>Round: <span id="roundValue">0</span></strong></div><h3>入っているお題</h3><ul id="missionPool"></ul><h3>さっき出たお題</h3><ul id="roundHistory"><li>まだ履歴がありません</li></ul></div></div><script type="module" src="/src/main.js"></script></body></html>
